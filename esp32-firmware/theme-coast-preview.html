<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海岸时光主题 - 一幕预览编辑器</title>
    <link rel="stylesheet" href="simulator-style.css" />
    <style>
      h1 { color: #00f3ff; margin-bottom: 16px; font-size: 22px; }

      .container { align-items: flex-start; }
      .led-panel-wrapper { gap: 6px; }

      .y-axis {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 10px;
        color: #666;
        font-size: 8px;
        text-align: right;
        width: 28px;
        font-family: 'Courier New', monospace;
        line-height: 10px;
      }
      .y-axis div {
        height: 10px;
        line-height: 10px;
      }
      .y-axis div.major { color: #00f3ff; font-weight: bold; }

      .x-axis {
        display: flex;
        justify-content: flex-start;
        padding-left: 0;
        color: #666;
        font-size: 8px;
        margin-top: 4px;
        width: 660px;
        font-family: 'Courier New', monospace;
      }
      .x-axis div {
        width: 10px;
        text-align: center;
      }
      .x-axis div.major { color: #00f3ff; font-weight: bold; }

      .container {
        align-items: flex-start;
      }

      /* ---- 左侧 LED 屏 + 坐标 ---- */
      .led-panel-wrapper { gap: 6px; }

      .scene-tab-bar {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .scene-tab-bar button {
        flex: 1 1 auto;
        min-width: 92px;
        margin: 0;
        padding: 10px 8px;
        font-size: 13px;
        background: #1a1a1a;
        color: #aaa;
        border: 1px solid #444;
      }
      .scene-tab-bar button.active {
        background: #00f3ff;
        color: #000;
        border-color: #00f3ff;
      }
      .scene-tab-bar button:hover {
        background: #2a2a2a;
        color: #fff;
      }
      .scene-tab-bar button.active:hover {
        background: #00d4dd;
        color: #000;
      }

      /* ---- 控制面板 ---- */
      .controls h2 {
        color: #00f3ff;
        font-size: 14px;
        margin: 16px 0 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid #333;
      }
      .controls h2:first-of-type { margin-top: 0; }

      .field-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 10px;
      }
      .field-row.full { grid-template-columns: 1fr; }
      .field-row label {
        display: block;
        font-size: 11px;
        color: #888;
        margin-bottom: 4px;
      }

      .layer-list {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 10px;
        font-size: 11px;
        color: #aaa;
        line-height: 1.7;
        font-family: 'Courier New', monospace;
        max-height: 200px;
        overflow-y: auto;
      }
      .layer-list .layer-line { display: flex; gap: 6px; align-items: center; }
      .layer-list .layer-line .tag {
        display: inline-block;
        padding: 1px 6px;
        font-size: 10px;
        background: #2a2a2a;
        color: #00f3ff;
        border: 1px solid #444;
        border-radius: 3px;
      }
      .layer-list .layer-line .tag.bg { color: #ffa340; border-color: #6b4a1f; }
      .layer-list .layer-line .tag.cloud { color: #80d0ff; border-color: #1f4a6b; }
      .layer-list .layer-line .tag.deco { color: #ff80c0; border-color: #6b1f4a; }

      /* 配置导出 */
      .config-output {
        max-height: 300px;
        font-family: 'Courier New', monospace;
        white-space: pre-wrap;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>海岸时光主题 — 一幕预览编辑器（64×64）</h1>

    <div class="container">
      <!-- ============ 左侧: LED 屏 + 坐标轴 ============ -->
      <div class="led-panel-wrapper">
        <div class="axis-container">
          <div class="y-axis" id="yAxis"></div>
          <div>
            <div class="led-panel" style="position:relative">
              <canvas id="ledCanvas" width="640" height="640"></canvas>
              <canvas id="gridCanvas" width="640" height="640" style="position:absolute;left:10px;top:10px;pointer-events:none;image-rendering:pixelated"></canvas>
            </div>
            <div class="x-axis" id="xAxis"></div>
          </div>
        </div>
        <div class="info" style="margin-top: 12px; max-width: 640px">
          💡 点击右侧时段按钮切换一幕；调整 X/Y 让整幕移动（对齐海岸线）；公用缩放控制所有时段。
        </div>
      </div>

      <!-- ============ 右侧: 控制面板 ============ -->
      <div class="controls">
        <!-- 时段切换 -->
        <h2>时段</h2>
        <div class="scene-tab-bar" id="sceneTabBar"></div>

        <!-- 原图参考 -->
        <h2>原图参考（合成图）</h2>
        <div id="refImageWrap" style="background:#000;border:1px solid #444;aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center;">
          <img id="refImage" style="max-width:100%;max-height:100%;image-rendering:pixelated;" alt="原图" />
        </div>
        <div id="refImageMeta" style="color:#888;font-size:11px;margin-top:4px;font-family:'Courier New',monospace;"></div>

        <!-- 当前一幕的 X/Y -->
        <h2>当前一幕</h2>
        <div class="field-row">
          <div>
            <label>X 偏移（整幕）</label>
            <div class="number-input-group">
              <button class="num-btn" data-act="sceneXMinus">-</button>
              <input type="number" id="sceneX" value="0" min="-64" max="64" />
              <button class="num-btn" data-act="sceneXPlus">+</button>
            </div>
          </div>
          <div>
            <label>Y 偏移（整幕）</label>
            <div class="number-input-group">
              <button class="num-btn" data-act="sceneYMinus">-</button>
              <input type="number" id="sceneY" value="0" min="-64" max="64" />
              <button class="num-btn" data-act="sceneYPlus">+</button>
            </div>
          </div>
        </div>

        <!-- 公用缩放 -->
        <h2>公用缩放（所有时段）</h2>
        <div class="field-row full">
          <div>
            <label>缩放百分比 = <span id="scaleLabel">100</span>%</label>
            <div class="number-input-group">
              <button class="num-btn" data-act="scaleMinus">-</button>
              <input type="range" id="globalScale" min="50" max="300" value="100" step="5" style="flex: 1" />
              <button class="num-btn" data-act="scalePlus">+</button>
            </div>
          </div>
        </div>

        <!-- 云滚动 -->
        <h2>云层滚动（公用）</h2>
        <div class="field-row">
          <div>
            <label>
              <input type="checkbox" id="cloudScrollOn" checked /> 启用
            </label>
          </div>
          <div>
            <label>速度（像素/秒）</label>
            <div class="number-input-group">
              <button class="num-btn" data-act="speedMinus">-</button>
              <input type="number" id="cloudSpeed" value="12" min="0" max="64" step="1" />
              <button class="num-btn" data-act="speedPlus">+</button>
            </div>
          </div>
        </div>

        <!-- 当前一幕的图层清单 -->
        <h2>当前一幕图层</h2>
        <div id="layerList" class="layer-list"></div>

        <!-- 导出 -->
        <h2>导出</h2>
        <button onclick="copyConfigJSON()">复制全部时段配置 JSON</button>
        <button class="secondary" onclick="toggleConfig()">显示/隐藏 JSON</button>
        <pre id="configOutput" class="config-output" style="display: none"></pre>
      </div>
    </div>

    <script>
      // =====================================================
      // 海岸时光主题 - 一幕预览编辑器
      // 每个时段 = 一个 Ocean_N, 各时段独立图层组合 + 独立 xy
      // 全局: 公用缩放, 云速度
      // =====================================================

      const ASSET_BASE = '../reference_assets/ocean-and-clouds/';

      // 7 个时段定义 (按用户指定的播放顺序)
      // 每个时段:
      //   id, label
      //   bg:    底层 PNG (海水+天空)
      //   clouds: 云层 PNG 数组 (横向滚动)
      //   deco:  点缀 PNG (淡入保持, 切幕时淡出) - null 表示无
      //   ref:   合成图 PNG (右侧原图参考用)
      const SCENES = [
        {
          id: 'scene_1', label: '清晨上午', oceanId: 'Ocean_1',
          bg: 'Ocean_1/1.png',
          clouds: ['Ocean_1/2.png', 'Ocean_1/3.png'],
          deco: null,
          ref: 'Ocean_1/4.png',
        },
        {
          id: 'scene_4', label: '黎明', oceanId: 'Ocean_4',
          bg: 'Ocean_4/1.png',
          clouds: ['Ocean_4/2.png', 'Ocean_4/3.png', 'Ocean_4/4.png'],
          deco: null,
          ref: 'Ocean_4/5.png',
        },
        {
          id: 'scene_3', label: '中午', oceanId: 'Ocean_3',
          bg: 'Ocean_3/1.png',
          clouds: ['Ocean_3/3.png', 'Ocean_3/4.png'],
          // Ocean_3/2.png 是陆地叠加层, 用户说陆地层先放一放, 暂不画
          deco: null,
          ref: 'Ocean_3/5.png',
        },
        {
          id: 'scene_8', label: '午后', oceanId: 'Ocean_8',
          bg: 'Ocean_8/1.png',
          clouds: ['Ocean_8/2.png', 'Ocean_8/3.png', 'Ocean_8/4.png'],
          deco: 'Ocean_8/5.png',  // 小月亮
          ref: 'Ocean_8/6.png',
        },
        {
          id: 'scene_2', label: '下午', oceanId: 'Ocean_2',
          bg: 'Ocean_2/2.png',  // 注意: Ocean_2 没有 1.png, 底是 2.png
          clouds: ['Ocean_2/3.png', 'Ocean_2/4.png'],
          deco: null,
          ref: 'Ocean_2/5.png',
        },
        {
          id: 'scene_5', label: '傍晚', oceanId: 'Ocean_5',
          bg: 'Ocean_5/1.png',
          clouds: ['Ocean_5/3.png', 'Ocean_5/4.png'],
          deco: 'Ocean_5/2.png',  // 星星
          ref: 'Ocean_5/5.png',
        },
        {
          id: 'scene_6', label: '深夜', oceanId: 'Ocean_6',
          bg: 'Ocean_6/5.png',     // 直接用合成图当底, 月亮+云+海原样不动
          clouds: [],              // 不再分层叠云
          deco: null,              // 不再单独画月亮
          ref: 'Ocean_6/5.png',
          freezeClouds: true,
        },
      ];

      // ============ 状态 ============
      let activeSceneIndex = 0;
      let globalScale = 2.95;       // 用户调好的公用缩放
      let cloudSpeed = 12;          // 像素/秒 (64 单位下)
      let cloudScrollOn = true;
      // 每幕的 xy 偏移 (用户调好的值)
      const sceneOffsets = {
        scene_1: { x: 0, y: 7 },
        scene_4: { x: 0, y: -7 },
        scene_3: { x: 0, y: -2 },
        scene_8: { x: 0, y: -10 },
        scene_2: { x: 0, y: -3 },
        scene_5: { x: 0, y: -21 },
        scene_6: { x: 0, y: 0 },
      };

      // 每个 PNG 的图像缓存
      const imageCache = new Map();
      function loadImage(path) {
        if (imageCache.has(path)) return imageCache.get(path);
        const img = new Image();
        const entry = { img, ready: false };
        img.onload = () => { entry.ready = true; };
        img.onerror = (e) => { console.warn('image load fail', path, e); };
        img.src = ASSET_BASE + path;
        imageCache.set(path, entry);
        return entry;
      }
      // 预加载全部 PNG
      for (const s of SCENES) {
        loadImage(s.bg);
        for (const c of s.clouds) loadImage(c);
        if (s.deco) loadImage(s.deco);
      }

      // ============ Canvas ============
      const SIZE = 64;
      const SCALE_FACTOR = 10; // 1 LED px = 10 canvas px
      const canvas = document.getElementById('ledCanvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: false });
      ctx.imageSmoothingEnabled = false;

      // 离屏 64×64
      const off = document.createElement('canvas');
      off.width = SIZE; off.height = SIZE;
      const offCtx = off.getContext('2d', { willReadFrequently: false });
      offCtx.imageSmoothingEnabled = false;

      // ============ 渲染 ============
      // 每张图按"宽对齐 64 + 等比缩高"基准放置, 然后再乘 globalScale + xy 偏移
      // 这样调整缩放和 xy 不破坏图层间的相对位置
      function imageBaseSize(img) {
        // 原图按宽 64 等比缩
        if (!img || !img.naturalWidth) return { w: SIZE, h: SIZE };
        const w = SIZE;
        const h = (img.naturalHeight / img.naturalWidth) * SIZE;
        return { w, h };
      }

      // 默认每张图垂直居中 (y0 = (64 - h)/2)
      // 然后用户的 sceneX/sceneY 在此基础上偏移
      function drawLayer(img, sceneOffset, scale, scrollX) {
        if (!img.ready) return;
        const base = imageBaseSize(img.img);
        const w = base.w * scale;
        const h = base.h * scale;
        const x0 = (SIZE - w) / 2 + sceneOffset.x + (scrollX || 0);
        const y0 = (SIZE - h) / 2 + sceneOffset.y;
        offCtx.drawImage(img.img, x0, y0, w, h);
      }

      // 对横向无缝滚动云层: 画两次, 一次在 x0, 一次在 x0 + base.w (或 x0 - base.w)
      // 让它从右往左漂出后从右又出现, 实现循环
      // 关键: x 取整, 保持 64×64 像素感, 不让浏览器做亚像素抗锯齿
      function drawCloudLayer(img, sceneOffset, scale, scrollOffset) {
        if (!img.ready) return;
        const base = imageBaseSize(img.img);
        const w = base.w * scale;
        const h = base.h * scale;
        const y0 = Math.round((SIZE - h) / 2 + sceneOffset.y);
        // scrollOffset 是浮点累加, 但绘制时取整, 避免亚像素跳动
        let x = Math.round((SIZE - w) / 2 + sceneOffset.x - (scrollOffset % w));
        // 画两次确保覆盖屏幕
        offCtx.drawImage(img.img, x, y0, Math.round(w), Math.round(h));
        offCtx.drawImage(img.img, x + Math.round(w), y0, Math.round(w), Math.round(h));
        if (x + 2 * Math.round(w) < SIZE) {
          offCtx.drawImage(img.img, x + 2 * Math.round(w), y0, Math.round(w), Math.round(h));
        }
      }

      let lastTime = performance.now();
      let scrollAccum = 0; // 累计像素滚动 (浮点, 64 单位)

      function render(now) {
        const dt = Math.min(0.1, (now - lastTime) / 1000);
        lastTime = now;

        const scene = SCENES[activeSceneIndex];
        const offset = sceneOffsets[scene.id];

        // 当前幕标记 freezeClouds 时, 云不滚动 (例如深夜 - 月亮静静挂着)
        const cloudsFrozen = scene.freezeClouds === true;
        if (cloudScrollOn && !cloudsFrozen) {
          scrollAccum += cloudSpeed * dt;
        }

        // 全部图层都画到 64×64 离屏 → 整数像素 → nearest 放大到 640×640
        offCtx.fillStyle = '#000';
        offCtx.fillRect(0, 0, SIZE, SIZE);

        // 1) 底层
        const bg = loadImage(scene.bg);
        drawLayer(bg, offset, globalScale, 0);

        // decoBeforeClouds: 月亮在云后面 (深夜场景)
        // 默认 (false): 底 → 云 → 点缀  (点缀盖在云上)
        // 标记 (true):  底 → 点缀 → 云  (云盖在点缀上, 月亮被云遮挡部分)
        const decoFirst = scene.decoBeforeClouds === true;

        if (decoFirst && scene.deco) {
          const decoImg = loadImage(scene.deco);
          drawLayer(decoImg, offset, globalScale, 0);
        }

        // 2) 云层 (整数像素横向滚动, 多张云用不同起始相位)
        scene.clouds.forEach((cloudPath, idx) => {
          const cloudImg = loadImage(cloudPath);
          const phase = idx * 17;
          drawCloudLayer(cloudImg, offset, globalScale, scrollAccum + phase);
        });

        // 3) 点缀层 (默认在云上面)
        if (!decoFirst && scene.deco) {
          const decoImg = loadImage(scene.deco);
          drawLayer(decoImg, offset, globalScale, 0);
        }

        // 离屏 → 主 canvas, nearest neighbor 放大
        ctx.imageSmoothingEnabled = false;
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 640, 640);
        ctx.drawImage(off, 0, 0, 640, 640);

        requestAnimationFrame(render);
      }
      requestAnimationFrame(render);

      // ============ UI ============
      const sceneTabBarEl = document.getElementById('sceneTabBar');
      const sceneXEl = document.getElementById('sceneX');
      const sceneYEl = document.getElementById('sceneY');
      const globalScaleEl = document.getElementById('globalScale');
      const scaleLabelEl = document.getElementById('scaleLabel');
      const cloudSpeedEl = document.getElementById('cloudSpeed');
      const cloudScrollOnEl = document.getElementById('cloudScrollOn');
      const layerListEl = document.getElementById('layerList');

      function renderSceneTabs() {
        sceneTabBarEl.innerHTML = '';
        SCENES.forEach((s, i) => {
          const btn = document.createElement('button');
          btn.textContent = `${s.label}\n${s.oceanId}`;
          btn.style.whiteSpace = 'pre-line';
          if (i === activeSceneIndex) btn.classList.add('active');
          btn.onclick = () => switchScene(i);
          sceneTabBarEl.appendChild(btn);
        });
      }

      function renderLayerList() {
        const scene = SCENES[activeSceneIndex];
        const o = sceneOffsets[scene.id];
        const lines = [];

        function fmtSize(path, tag, tagClass, extra) {
          const entry = loadImage(path);
          let origInfo = '加载中...';
          let renderInfo = '';
          if (entry.ready) {
            const ow = entry.img.naturalWidth;
            const oh = entry.img.naturalHeight;
            // 基准: 宽 64, 高按比例
            const baseH = (oh / ow) * SIZE;
            // 实际显示: 乘公用缩放
            const dw = SIZE * globalScale;
            const dh = baseH * globalScale;
            // 屏上左上角 (考虑垂直居中 + scene xy)
            const x0 = (SIZE - dw) / 2 + o.x;
            const y0 = (SIZE - dh) / 2 + o.y;
            origInfo = `${ow}×${oh}`;
            renderInfo = `→ 屏上 ${dw.toFixed(1)}×${dh.toFixed(1)} @ (${x0.toFixed(1)}, ${y0.toFixed(1)})`;
          }
          return `<div class="layer-line">
            <span class="tag ${tagClass}">${tag}</span>
            <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${path}</span>
            <span style="color:#888;font-size:10px">${extra || ''}</span>
          </div>
          <div style="color:#888;font-size:10px;padding-left:34px;margin-bottom:4px">原图 ${origInfo} ${renderInfo}</div>`;
        }

        lines.push(fmtSize(scene.bg, '底', 'bg'));
        scene.clouds.forEach((c, i) => {
          lines.push(fmtSize(c, `云${i + 1}`, 'cloud', '横滚'));
        });
        if (scene.deco) {
          lines.push(fmtSize(scene.deco, '点缀', 'deco'));
        }
        layerListEl.innerHTML = lines.join('');
      }

      function syncControlsFromState() {
        const scene = SCENES[activeSceneIndex];
        const o = sceneOffsets[scene.id];
        sceneXEl.value = o.x;
        sceneYEl.value = o.y;
        globalScaleEl.value = Math.round(globalScale * 100);
        scaleLabelEl.textContent = Math.round(globalScale * 100);
        cloudSpeedEl.value = cloudSpeed;
        cloudScrollOnEl.checked = cloudScrollOn;
      }

      function switchScene(i) {
        activeSceneIndex = i;
        renderSceneTabs();
        renderLayerList();
        syncControlsFromState();
        updateRefImage();
        updateConfigIfShown();
      }

      function updateRefImage() {
        const scene = SCENES[activeSceneIndex];
        const refEl = document.getElementById('refImage');
        const metaEl = document.getElementById('refImageMeta');
        if (scene.ref) {
          refEl.src = ASSET_BASE + scene.ref;
          refEl.style.display = 'block';
          // 加载完成后显示原图尺寸
          refEl.onload = () => {
            metaEl.textContent = `${scene.ref} · ${refEl.naturalWidth}×${refEl.naturalHeight}`;
          };
        } else {
          refEl.style.display = 'none';
          metaEl.textContent = '(无原图)';
        }
      }

      // 输入事件
      sceneXEl.addEventListener('input', () => {
        sceneOffsets[SCENES[activeSceneIndex].id].x = Number(sceneXEl.value) || 0;
        renderLayerList();
        updateConfigIfShown();
      });
      sceneYEl.addEventListener('input', () => {
        sceneOffsets[SCENES[activeSceneIndex].id].y = Number(sceneYEl.value) || 0;
        renderLayerList();
        updateConfigIfShown();
      });
      globalScaleEl.addEventListener('input', () => {
        globalScale = Number(globalScaleEl.value) / 100;
        scaleLabelEl.textContent = globalScaleEl.value;
        renderLayerList();
        updateConfigIfShown();
      });
      cloudSpeedEl.addEventListener('input', () => {
        cloudSpeed = Number(cloudSpeedEl.value) || 0;
        updateConfigIfShown();
      });
      cloudScrollOnEl.addEventListener('change', () => {
        cloudScrollOn = cloudScrollOnEl.checked;
        updateConfigIfShown();
      });

      // +/- 按钮
      document.querySelectorAll('button.num-btn[data-act]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const act = btn.dataset.act;
          if (act === 'sceneXMinus') { sceneXEl.value = Number(sceneXEl.value) - 1; sceneXEl.dispatchEvent(new Event('input')); }
          else if (act === 'sceneXPlus') { sceneXEl.value = Number(sceneXEl.value) + 1; sceneXEl.dispatchEvent(new Event('input')); }
          else if (act === 'sceneYMinus') { sceneYEl.value = Number(sceneYEl.value) - 1; sceneYEl.dispatchEvent(new Event('input')); }
          else if (act === 'sceneYPlus') { sceneYEl.value = Number(sceneYEl.value) + 1; sceneYEl.dispatchEvent(new Event('input')); }
          else if (act === 'scaleMinus') { globalScaleEl.value = Number(globalScaleEl.value) - 5; globalScaleEl.dispatchEvent(new Event('input')); }
          else if (act === 'scalePlus') { globalScaleEl.value = Number(globalScaleEl.value) + 5; globalScaleEl.dispatchEvent(new Event('input')); }
          else if (act === 'speedMinus') { cloudSpeedEl.value = Math.max(0, Number(cloudSpeedEl.value) - 1); cloudSpeedEl.dispatchEvent(new Event('input')); }
          else if (act === 'speedPlus') { cloudSpeedEl.value = Math.min(64, Number(cloudSpeedEl.value) + 1); cloudSpeedEl.dispatchEvent(new Event('input')); }
        });
      });

      // ============ 导出 ============
      function buildConfig() {
        return {
          generatedAt: new Date().toISOString(),
          globalScale,
          cloudSpeed,
          cloudScrollOn,
          scenes: SCENES.map((s) => ({
            id: s.id,
            label: s.label,
            oceanId: s.oceanId,
            bg: s.bg,
            clouds: s.clouds,
            deco: s.deco,
            offset: { ...sceneOffsets[s.id] },
          })),
        };
      }

      function copyConfigJSON() {
        const json = JSON.stringify(buildConfig(), null, 2);
        navigator.clipboard.writeText(json).then(
          () => alert('已复制全部时段配置 JSON 到剪贴板'),
          () => {
            const out = document.getElementById('configOutput');
            out.textContent = json;
            out.style.display = 'block';
            alert('剪贴板不可用, 已显示在下方');
          },
        );
      }

      function toggleConfig() {
        const out = document.getElementById('configOutput');
        if (out.style.display === 'none') {
          out.textContent = JSON.stringify(buildConfig(), null, 2);
          out.style.display = 'block';
        } else {
          out.style.display = 'none';
        }
      }

      function updateConfigIfShown() {
        const out = document.getElementById('configOutput');
        if (out.style.display !== 'none') {
          out.textContent = JSON.stringify(buildConfig(), null, 2);
        }
      }

      // ============ 启动 ============
      buildAxisAndGrid();
      renderSceneTabs();
      renderLayerList();
      syncControlsFromState();
      updateRefImage();

      // ============ 坐标轴 + 网格 ============
      function buildAxisAndGrid() {
        // X 轴: 64 个格子, 每格都标数字 0..63, 每 8 个高亮
        const xAxisEl = document.getElementById('xAxis');
        let html = '';
        for (let i = 0; i < 64; i += 1) {
          const major = (i % 8 === 0 || i === 63);
          html += `<div class="${major ? 'major' : ''}">${i}</div>`;
        }
        xAxisEl.innerHTML = html;

        // Y 轴: 64 个格子, 每格都标数字 0..63, 每 8 个高亮
        const yAxisEl = document.getElementById('yAxis');
        html = '';
        for (let i = 0; i < 64; i += 1) {
          const major = (i % 8 === 0 || i === 63);
          html += `<div class="${major ? 'major' : ''}">${i}</div>`;
        }
        yAxisEl.innerHTML = html;

        // 网格线: 在 gridCanvas 上画出 64×64 的格子, 每 8 个加粗
        const grid = document.getElementById('gridCanvas');
        const gctx = grid.getContext('2d');
        gctx.clearRect(0, 0, 640, 640);
        // 每像素一条细线 (alpha=0.1)
        gctx.strokeStyle = 'rgba(0,243,255,0.10)';
        gctx.lineWidth = 1;
        for (let i = 0; i <= 64; i += 1) {
          gctx.beginPath();
          gctx.moveTo(i * 10 + 0.5, 0);
          gctx.lineTo(i * 10 + 0.5, 640);
          gctx.stroke();
          gctx.beginPath();
          gctx.moveTo(0, i * 10 + 0.5);
          gctx.lineTo(640, i * 10 + 0.5);
          gctx.stroke();
        }
        // 每 8 像素一条加粗线 (alpha=0.4)
        gctx.strokeStyle = 'rgba(0,243,255,0.40)';
        gctx.lineWidth = 1;
        for (let i = 0; i <= 64; i += 8) {
          gctx.beginPath();
          gctx.moveTo(i * 10 + 0.5, 0);
          gctx.lineTo(i * 10 + 0.5, 640);
          gctx.stroke();
          gctx.beginPath();
          gctx.moveTo(0, i * 10 + 0.5);
          gctx.lineTo(640, i * 10 + 0.5);
          gctx.stroke();
        }
      }
    </script>
  </body>
</html>
