<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>时钟草背景手绘工具</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,'Microsoft YaHei',sans-serif}
body{background:#1a1b28;color:#e0e0e0;padding:20px;font-size:13px}
.app{display:grid;grid-template-columns:1fr 320px;gap:20px;max-width:1400px;margin:0 auto}
.canvas-area{background:#22232f;border:1px solid #3a3b55;border-radius:8px;padding:16px}
.controls{background:#22232f;border:1px solid #3a3b55;border-radius:8px;padding:16px}
h1{font-size:18px;color:#9bc0ff;margin-bottom:10px}
h3{font-size:14px;color:#9bc0ff;margin:12px 0 6px;border-bottom:1px solid #3a3b55;padding-bottom:4px}
canvas{cursor:crosshair;border:2px solid #555;background:#0a0a14;image-rendering:pixelated;display:block;margin:10px auto}
.palette{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
.color-btn{padding:10px;border-radius:4px;cursor:pointer;border:3px solid transparent;font-weight:600;color:#fff;text-shadow:0 0 2px #000;font-size:12px;text-align:center}
.color-btn.active{border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.5)}
.btn{background:#3060ff;color:#fff;border:none;padding:8px 14px;border-radius:4px;cursor:pointer;font-size:13px;margin:3px}
.btn:hover{background:#4070ff}
.btn-warn{background:#aa3030}.btn-warn:hover{background:#cc4040}
.btn-secondary{background:#445}.btn-secondary:hover{background:#556}
textarea{width:100%;height:160px;background:#0a0a14;color:#9bc0ff;border:1px solid #45475e;font-family:monospace;font-size:11px;padding:8px;border-radius:4px;resize:vertical}
.tip{font-size:11px;color:#888;line-height:1.6;margin-top:6px}
.row{display:flex;align-items:center;gap:8px;margin:5px 0}
.row label{flex:0 0 80px;color:#a8a8b8}
.row input[type=range]{flex:1}
.row .val{flex:0 0 40px;text-align:right;color:#9bc0ff;font-family:monospace}
.meta{color:#666;font-size:12px;margin-top:4px}
</style>
</head>
<body>
<div class="app">

<div class="canvas-area">
<h1>时钟草背景手绘工具</h1>
<div class="meta" id="meta">加载中...</div>
<canvas id="cv" width="640" height="480"></canvas>
<div class="tip">
  • 左键: 用当前选中颜色填充<br>
  • 右键: 清除像素 (恢复透明 = 蓝色背景)<br>
  • 鼠标拖动: 连续涂抹<br>
  • 时间字本身 (土色 #5c4449) 不可点击, 只能改外圈草<br>
  • PAD = 2px 膨胀 (字外扩散 2 个像素 = 草区域)
</div>
</div>

<div class="controls">

<h3>设置</h3>
<div class="row">
  <label>时间</label>
  <input type="text" id="time-text" value="14:57" maxlength="5" style="flex:1;background:#2e2f47;color:#fff;border:1px solid #45475e;border-radius:4px;padding:4px 6px">
</div>
<div class="row">
  <label>字体</label>
  <select id="font-id" style="flex:1;background:#2e2f47;color:#fff;border:1px solid #45475e;border-radius:4px;padding:4px"></select>
</div>
<div class="row"><label>字号</label><input type="range" id="scale" min="1" max="3" value="1"><span class="val" id="scale-v">1×</span></div>
<div class="row"><label>PAD 膨胀</label><input type="range" id="pad" min="1" max="4" value="2"><span class="val" id="pad-v">2px</span></div>

<h3>当前画笔</h3>
<div class="palette" id="palette"></div>

<h3>显示</h3>
<div class="row"><label>缩放</label><input type="range" id="zoom" min="6" max="32" value="16" step="2"><span class="val" id="zoom-v">16×</span></div>
<div class="row"><label>显示网格</label><input type="checkbox" id="show-grid" checked></div>

<h3>预设</h3>
<button class="btn btn-secondary" onclick="autoFill(1)">全填浅绿</button>
<button class="btn btn-secondary" onclick="autoFill(2)">全填中绿</button>
<button class="btn btn-secondary" onclick="autoFill(3)">全填暗绿</button>
<button class="btn btn-secondary" onclick="autoGradient()">上下渐变</button>
<button class="btn btn-warn" onclick="clearAll()">全部清除</button>

<h3>导出 / 导入</h3>
<button class="btn" onclick="exportData()">导出 JSON</button>
<button class="btn" onclick="importData()">从 JSON 导入</button>
<textarea id="json-area" placeholder="导出后这里显示像素数组,可复制保存"></textarea>

<div class="tip" style="margin-top:10px;background:#33344a;padding:10px;border-radius:4px">
  <b>颜色 ID:</b> 0=透明 1=亮绿 2=中绿 3=暗绿<br>
  <b>导出格式:</b> 二维数组每行=像素行,值是 color id, -1 = 非草区
</div>

</div>

</div>

<script>
const COLORS = [
    { id: 0, hex: 'transparent', label: '清除' },
    { id: 1, hex: '#8FD71D', label: '亮绿' },
    { id: 2, hex: '#63971F', label: '中绿' },
    { id: 3, hex: '#28650D', label: '暗绿' },
];
const TEXT_COLOR = '#5c4449';
const BG_COLOR   = '#3A5A8C';

let CLOCK_FONTS = null;
let currentFont = null;
let currentColor = 1;
let zoom = 16;
let scale = 1;
let pad = 2;
let text = '14:57';

let canvasW = 0, canvasH = 0;
let textMask = null, grassMask = null;
let pixels = null;

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

function clockGlyphIndex(ch) {
    if (ch >= '0' && ch <= '9') return ch.charCodeAt(0) - 48;
    if (ch === ':') return 10;
    return -1;
}

function clockTextWidth(t, font, sc) {
    let w = 0;
    for (let i = 0; i < t.length; i++) {
        if (clockGlyphIndex(t[i]) < 0) continue;
        if (i > 0) w += font.spacing * sc;
        w += font.width * sc;
    }
    return w;
}

function buildMasks() {
    if (!currentFont) return;
    const f = currentFont;
    const totalW = clockTextWidth(text, f, scale);
    const totalH = f.height * scale;
    canvasW = totalW + pad * 2;
    canvasH = totalH + pad * 2;
    const TX0 = pad, TY0 = pad;

    textMask = new Uint8Array(canvasW * canvasH);
    let curX = 0;
    for (let i = 0; i < text.length; i++) {
        const gi = clockGlyphIndex(text[i]);
        if (gi < 0) continue;
        if (i > 0) curX += f.spacing * scale;
        const g = f.glyphs[gi];
        for (let row = 0; row < f.height; row++) {
            const bits = g[row];
            for (let col = 0; col < f.width; col++) {
                if (bits & (1 << (f.width - 1 - col))) {
                    for (let sy = 0; sy < scale; sy++) {
                        for (let sx = 0; sx < scale; sx++) {
                            const mx = TX0 + curX + col * scale + sx;
                            const my = TY0 + row * scale + sy;
                            textMask[my * canvasW + mx] = 1;
                        }
                    }
                }
            }
        }
        curX += f.width * scale;
    }

    // 草膨胀: 把 textMask 用圆形/曼哈顿距离 PAD 像素扩散
    //   每个 textMask=1 的像素周围 PAD 内所有像素都标记为 grass
    grassMask = new Uint8Array(canvasW * canvasH);
    for (let y = 0; y < canvasH; y++) {
        for (let x = 0; x < canvasW; x++) {
            if (!textMask[y * canvasW + x]) continue;
            // 这个亮像素向外扩散 pad 格(切比雪夫,正方形邻域)
            for (let dy = -pad; dy <= pad; dy++) {
                for (let dx = -pad; dx <= pad; dx++) {
                    const nx = x + dx, ny = y + dy;
                    if (nx < 0 || ny < 0 || nx >= canvasW || ny >= canvasH) continue;
                    grassMask[ny * canvasW + nx] = 1;
                }
            }
        }
    }
    // 字本身的位置不算草
    for (let i = 0; i < textMask.length; i++) {
        if (textMask[i]) grassMask[i] = 0;
    }

    // 重新分配 pixels (保留之前已点的颜色——按 grassMask 投影)
    const newPixels = new Uint8Array(canvasW * canvasH);
    if (pixels) {
        // 简单复制相同位置
        const minW = Math.min(canvasW, Math.sqrt(pixels.length) | 0);
        // 不做精确迁移,直接清空
    }
    pixels = newPixels;
}

function render() {
    cv.width = canvasW * zoom;
    cv.height = canvasH * zoom;
    ctx.imageSmoothingEnabled = false;

    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, cv.width, cv.height);

    // 草区域 (用户上色)
    for (let y = 0; y < canvasH; y++) {
        for (let x = 0; x < canvasW; x++) {
            if (!grassMask[y * canvasW + x]) continue;
            const cid = pixels[y * canvasW + x];
            const color = COLORS[cid];
            if (color.hex === 'transparent') {
                ctx.fillStyle = 'rgba(120,120,120,0.3)';
            } else {
                ctx.fillStyle = color.hex;
            }
            ctx.fillRect(x * zoom, y * zoom, zoom, zoom);
        }
    }

    // 时间字 (土色)
    ctx.fillStyle = TEXT_COLOR;
    for (let y = 0; y < canvasH; y++) {
        for (let x = 0; x < canvasW; x++) {
            if (textMask[y * canvasW + x]) {
                ctx.fillRect(x * zoom, y * zoom, zoom, zoom);
            }
        }
    }

    if (document.getElementById('show-grid').checked) {
        ctx.strokeStyle = 'rgba(255,255,255,0.15)';
        ctx.lineWidth = 1;
        for (let y = 0; y <= canvasH; y++) {
            ctx.beginPath(); ctx.moveTo(0, y * zoom); ctx.lineTo(cv.width, y * zoom); ctx.stroke();
        }
        for (let x = 0; x <= canvasW; x++) {
            ctx.beginPath(); ctx.moveTo(x * zoom, 0); ctx.lineTo(x * zoom, cv.height); ctx.stroke();
        }
    }

    document.getElementById('meta').textContent =
        `字体: ${currentFont.name} (${currentFont.width}×${currentFont.height})  ` +
        `时间: "${text}"  字号 ${scale}×  PAD ${pad}px  ` +
        `画布 ${canvasW}×${canvasH}px`;
}

function buildPalette() {
    const pal = document.getElementById('palette');
    pal.innerHTML = '';
    for (const c of COLORS) {
        const d = document.createElement('div');
        d.className = 'color-btn' + (c.id === currentColor ? ' active' : '');
        if (c.hex === 'transparent') {
            d.style.background = 'repeating-conic-gradient(#444 0% 25%, #222 25% 50%) 0 0/12px 12px';
        } else {
            d.style.background = c.hex;
        }
        d.textContent = `${c.id}: ${c.label}`;
        d.onclick = () => { currentColor = c.id; buildPalette(); };
        pal.appendChild(d);
    }
}

let drawing = false;
let drawColor = null;

function pixelAt(e) {
    const r = cv.getBoundingClientRect();
    const x = Math.floor((e.clientX - r.left) / zoom);
    const y = Math.floor((e.clientY - r.top) / zoom);
    if (x < 0 || y < 0 || x >= canvasW || y >= canvasH) return null;
    return [x, y];
}

cv.addEventListener('contextmenu', e => e.preventDefault());
cv.addEventListener('mousedown', e => {
    const p = pixelAt(e);
    if (!p) return;
    if (!grassMask[p[1] * canvasW + p[0]]) return;
    drawing = true;
    drawColor = (e.button === 2) ? 0 : currentColor;
    pixels[p[1] * canvasW + p[0]] = drawColor;
    render();
});
cv.addEventListener('mousemove', e => {
    if (!drawing) return;
    const p = pixelAt(e);
    if (!p) return;
    if (!grassMask[p[1] * canvasW + p[0]]) return;
    pixels[p[1] * canvasW + p[0]] = drawColor;
    render();
});
window.addEventListener('mouseup', () => { drawing = false; });

document.getElementById('zoom').addEventListener('input', e => {
    zoom = parseInt(e.target.value);
    document.getElementById('zoom-v').textContent = zoom + '×';
    render();
});
document.getElementById('show-grid').addEventListener('change', render);

document.getElementById('time-text').addEventListener('input', e => {
    text = e.target.value;
    buildMasks(); render();
});
document.getElementById('font-id').addEventListener('change', e => {
    currentFont = CLOCK_FONTS[parseInt(e.target.value)];
    buildMasks(); render();
});
document.getElementById('scale').addEventListener('input', e => {
    scale = parseInt(e.target.value);
    document.getElementById('scale-v').textContent = scale + '×';
    buildMasks(); render();
});
document.getElementById('pad').addEventListener('input', e => {
    pad = parseInt(e.target.value);
    document.getElementById('pad-v').textContent = pad + 'px';
    buildMasks(); render();
});

window.autoFill = (id) => {
    for (let y = 0; y < canvasH; y++) {
        for (let x = 0; x < canvasW; x++) {
            if (grassMask[y * canvasW + x]) pixels[y * canvasW + x] = id;
        }
    }
    render();
};
window.autoGradient = () => {
    for (let y = 0; y < canvasH; y++) {
        const cid = y < canvasH / 3 ? 1 : (y < 2 * canvasH / 3 ? 2 : 3);
        for (let x = 0; x < canvasW; x++) {
            if (grassMask[y * canvasW + x]) pixels[y * canvasW + x] = cid;
        }
    }
    render();
};
window.clearAll = () => {
    pixels.fill(0);
    render();
};

window.exportData = () => {
    const out = [];
    for (let y = 0; y < canvasH; y++) {
        const row = [];
        for (let x = 0; x < canvasW; x++) {
            if (grassMask[y * canvasW + x]) {
                row.push(pixels[y * canvasW + x]);
            } else {
                row.push(-1);
            }
        }
        out.push(row);
    }
    document.getElementById('json-area').value = JSON.stringify(out);
};

window.importData = () => {
    try {
        const arr = JSON.parse(document.getElementById('json-area').value);
        for (let y = 0; y < arr.length && y < canvasH; y++) {
            for (let x = 0; x < arr[y].length && x < canvasW; x++) {
                const v = arr[y][x];
                if (v >= 0 && grassMask[y * canvasW + x]) {
                    pixels[y * canvasW + x] = v;
                }
            }
        }
        render();
    } catch (e) {
        alert('JSON 格式错: ' + e.message);
    }
};

(async function init() {
    const r = await fetch('terraria/_data/clock_fonts.json');
    CLOCK_FONTS = await r.json();
    const sel = document.getElementById('font-id');
    sel.innerHTML = '';
    for (let i = 0; i < CLOCK_FONTS.length; i++) {
        const f = CLOCK_FONTS[i];
        const o = document.createElement('option');
        o.value = String(i);
        o.textContent = `${i}: ${f.name} (${f.width}×${f.height})`;
        sel.appendChild(o);
    }
    sel.value = '3';  // 默认 lcd_6x8
    currentFont = CLOCK_FONTS[3];
    buildPalette();
    buildMasks();
    render();
})();
</script>
</body>
</html>
